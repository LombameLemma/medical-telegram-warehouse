version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: medical_warehouse_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-medical_warehouse}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - medical_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-medical_warehouse}
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medical_network

  dagster:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_dagster
    command: dagster dev -h 0.0.0.0 -p 3000 -f pipeline.py
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-medical_warehouse}
      DAGSTER_HOME: /app/dagster_home
    volumes:
      - .:/app
      - dagster_home:/app/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medical_network

volumes:
  postgres_data:
  dagster_home:

networks:
  medical_network:
    driver: bridge
