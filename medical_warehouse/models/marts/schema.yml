version: 2

models:
  - name: dim_channels
    description: Dimension table containing channel information and aggregated metrics
    columns:
      - name: channel_key
        description: Surrogate key for the channel dimension
        tests:
          - unique
          - not_null
      - name: channel_username
        description: Unique username of the Telegram channel
        tests:
          - unique
          - not_null
      - name: channel_name
        description: Display name of the channel
        tests:
          - not_null
      - name: channel_type
        description: Classification of the channel (Pharmaceutical, Cosmetics, Medical, Other)
        tests:
          - accepted_values:
              values: ['Pharmaceutical', 'Cosmetics', 'Medical', 'Other']
      - name: first_post_date
        description: Date of the first post in the dataset
        tests:
          - not_null
      - name: last_post_date
        description: Date of the most recent post
        tests:
          - not_null
      - name: total_posts
        description: Total number of posts from this channel
        tests:
          - not_null
      - name: posts_with_images
        description: Number of posts containing images
      - name: image_usage_percentage
        description: Percentage of posts that contain images
      - name: avg_views
        description: Average number of views per post
      - name: avg_forwards
        description: Average number of forwards per post
      - name: total_views
        description: Total views across all posts
      - name: total_forwards
        description: Total forwards across all posts

  - name: dim_dates
    description: Date dimension table for time-series analysis
    columns:
      - name: date_key
        description: Surrogate key for the date dimension
        tests:
          - unique
          - not_null
      - name: full_date
        description: The actual date value
        tests:
          - unique
          - not_null
      - name: year
        description: Year (YYYY)
        tests:
          - not_null
      - name: quarter
        description: Quarter of the year (1-4)
        tests:
          - not_null
      - name: month
        description: Month number (1-12)
        tests:
          - not_null
      - name: month_name
        description: Full month name
      - name: month_name_short
        description: Abbreviated month name
      - name: week_of_year
        description: Week number of the year (1-53)
      - name: day
        description: Day of the month (1-31)
      - name: day_of_week
        description: Day of week number (0=Sunday, 6=Saturday)
      - name: day_name
        description: Full day name
      - name: day_name_short
        description: Abbreviated day name
      - name: is_weekend
        description: Boolean indicating if the date is a weekend
      - name: is_holiday
        description: Boolean indicating if the date is a holiday

  - name: fct_messages
    description: Fact table containing message-level data with metrics and foreign keys
    columns:
      - name: message_id
        description: Unique message identifier from Telegram
        tests:
          - unique
          - not_null
      - name: channel_key
        description: Foreign key to dim_channels
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: Foreign key to dim_dates
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: channel_username
        description: Channel username (denormalized for convenience)
      - name: message_date
        description: Timestamp when message was posted
        tests:
          - not_null
      - name: message_text
        description: Full text content of the message
      - name: message_length
        description: Character count of the message text
        tests:
          - not_null
      - name: has_media
        description: Boolean indicating if message has any media
      - name: has_image
        description: Boolean indicating if message has an image
      - name: image_path
        description: Path to the downloaded image file
      - name: views
        description: Number of views on the message
        tests:
          - not_null
      - name: forwards
        description: Number of times the message was forwarded
        tests:
          - not_null
      - name: views_per_character
        description: Calculated metric - views divided by message length
      - name: forward_rate_percentage
        description: Percentage of views that resulted in forwards
      - name: message_hour
        description: Hour of day when message was posted (0-23)
      - name: day_of_week
        description: Day of week when message was posted
      - name: is_weekend
        description: Boolean indicating if message was posted on weekend
      - name: message_length_category
        description: Categorization of message length
        tests:
          - accepted_values:
              values: ['Empty', 'Short', 'Medium', 'Long', 'Very Long']
      - name: engagement_category
        description: Categorization of engagement level
        tests:
          - accepted_values:
              values: ['Low', 'Medium', 'High', 'Very High']
