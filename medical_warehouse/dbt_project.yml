name: 'medical_warehouse'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'medical_warehouse'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Configuring models
models:
  medical_warehouse:
    # Staging models - clean and standardize raw data
    staging:
      +materialized: view
      +schema: staging
      
    # Marts - dimensional models for analytics
    marts:
      +materialized: table
      +schema: marts

# Global configurations
vars:
  # Start date for data processing (can be overridden)
  start_date: '2024-01-01'

# Documentation
docs-paths: ["docs"]
